spring.application.name=users-api

# Active profile (dev by default; override with SPRING_PROFILES_ACTIVE env var)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8014}

# ---- Datasource (values pulled from environment / .env) ----
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:users_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:users_api}
spring.datasource.password=${DB_PASSWORD:asdfghjkl}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- HikariCP connection pool ----
spring.datasource.hikari.pool-name=UsersApiHikariPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:30000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}

# ---- JPA / Hibernate ----
# Flyway owns schema creation; Hibernate should only validate it matches the entities.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- JWT ----
# JWT_SECRET must be set in the environment / .env for real deployments.
# The fallback below is ONLY for convenience in local dev and is not secure for production.
app.jwt.secret=${JWT_SECRET:dev-only-fallback-secret-change-me-please-32bytes-min}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ---- Initial admin seeding (optional) ----
# If both are set and no user with this email exists yet, an ADMIN account is created on startup.
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}
app.admin.name=${ADMIN_NAME:Admin}
